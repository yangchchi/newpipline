server:
  port: 8080

spring:
  application:
    name: map-zh-property
  datasource:
    url: jdbc:h2:mem:zhmap;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

# 出站 HTTP 超时（预留 RestTemplate / WebClient）
app:
  http:
    connect-timeout-ms: 5000
    read-timeout-ms: 10000
